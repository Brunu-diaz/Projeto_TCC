<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedidaCerta - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='%230d6efd' d='M8 16a6 6 0 0 0 6-6c0-1.65-1.35-4-6-10-4.65 6-6 8.35-6 10a6 6 0 0 0 6 6z'/></svg>">
    <style>
        body {
            /* Fundo com um degradê suave que lembra água/tecnologia */
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Organiza header em cima e conteúdo embaixo */
        }
        
        .navbar-custom {
            background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-container {
            flex: 1; /* Faz esta div ocupar todo o espaço restante abaixo do header */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            background-color: #f8f9fa;
        }

        .logo-login {
            font-size: 2.5rem;
            color: #0d6efd;
        }
        
        /* Ajuste para o link ativo no menu */
        .nav-link.active {
            color: #fff !important;
            border-bottom: 2px solid #fff;
        }

        footer {
    background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%) !important;
}
    </style>
</head>
<body>
    
    <!-- Header Padrão -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
                    <i class="bi bi-droplet-fill me-2"></i> MedidaCerta
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto text-white">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="quemsomos.html">Quem Somos</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#contato">Contato</a></li>
                        <li class="nav-item">
                            <a class="nav-link active fw-bold" href="login.html">
                                Login <i class="bi bi-box-arrow-in-right"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    
    <!-- Container que centraliza o card -->
    <div class="main-container bg-light">
        <div class="card login-card p-4 bg-white">
            <div class="card-body">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <i class="bi bi-droplet-fill logo-login"></i>
                        <h2 class="fw-bold text-dark mt-2">MedidaCerta</h2>
                    </a>
                    <p class="text-muted">Acesse seu painel de consumo</p>
                </div>

                <form action="dashboard.html" method="GET">
                    <div class="mb-3">
                        <label class="form-label fw-bold small" for="iusuario">E-mail ou Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="email" class="form-control border-0" id="iusuario" placeholder="exemplo@email.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small" for="isenha">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-0" placeholder="••••••••" required id="isenha">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mb-4 small">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label text-muted" for="remember">Lembrar-me</label>
                        </div>
                        <a href="#" class="text-primary text-decoration-none">Esqueceu a senha?</a>
                    </div>

                    <a href="dashboard.html">
                        <button type="submit" class="btn btn-primary w-100 btn-login shadow-sm">
                            Entrar <i class="bi bi-box-arrow-in-right ms-2"></i>
                        </button>
                    </a>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small">Ainda não tem acesso? <br> 
                    <a href="cadastro.html" class="fw-bold text-primary text-decoration-none">Criar Cadastro</a></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-dark text-center text-white">
        <div class="container">
            <p class="mb-0">&copy; 2026 MedidaCerta - Sistema de Gestão de Água Condominial. Todos os direitos reservados.</p>
            <p class="mb-0">CNPJ: 00.000.000/0001-00</p>
            <p class="mb-0">Brasília-DF</p>
        </div>
    </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
