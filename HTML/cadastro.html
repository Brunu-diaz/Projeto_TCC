<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedidaCerta - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='%230d6efd' d='M8 16a6 6 0 0 0 6-6c0-1.65-1.35-4-6-10-4.65 6-6 8.35-6 10a6 6 0 0 0 6 6z'/></svg>">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .navbar-custom {
            background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px; /* Mais respiro para formulários maiores */
        }

        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px; /* Um pouco mais largo para o cadastro */
        }

        .btn-custom {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            background-color: #f8f9fa;
        }

        .logo-login {
            font-size: 2.5rem;
            color: #0d6efd;
        }
        
        .nav-link.active {
            color: #fff !important;
            border-bottom: 2px solid #fff;
        }

        footer {
            background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%) !important;
        }
    </style>
</head>
<body>
    
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
                    <i class="bi bi-droplet-fill me-2"></i> MedidaCerta
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto text-white">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="quemsomos.html">Quem Somos</a></li>
                        <li class="nav-item">
                            <a class="nav-link fw-bold" href="login.html">
                                Login <i class="bi bi-box-arrow-in-right"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    
    <div class="main-container bg-light">
        <div class="card login-card p-4 bg-white">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill logo-login"></i>
                    <h2 class="fw-bold text-dark mt-2">Criar Conta</h2>
                    <p class="text-muted">Cadastre-se para gerenciar seu consumo</p>
                </div>

                <form action="../PHP/controller/CadastroUsuarioControl.php" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold small" for="nome">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="nome" class="form-control border-0" id="nome" placeholder="Seu nome aqui" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small" for="email">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control border-0" id="email" placeholder="exemplo@email.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small" for="senha">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="senha" class="form-control border-0" id="senha" placeholder="••••••••" required>
                        </div>
                        <div id="passwordHelp" class="form-text small text-muted">Use pelo menos 8 caracteres.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-custom shadow-sm mb-3">
                        Finalizar Cadastro <i class="bi bi-check-circle ms-2"></i>
                    </button>

                    <a href="login.html" class="btn btn-outline-secondary w-100 btn-custom border-0">
                        Já tenho conta, quero entrar
                    </a>
                </form>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-dark text-center text-white">
        <div class="container">
            <p class="mb-0">&copy; 2026 MedidaCerta - Sistema de Gestão de Água Condominial. Todos os direitos reservados.</p>
            <p class="mb-0">CNPJ: 00.000.000/0001-00</p>
            <p class="mb-0">Brasília-DF</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
